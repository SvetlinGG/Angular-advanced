<div class="top-menu">

  <img class="logo"
    src="https://angular-academy.s3.amazonaws.com/main-logo/main-page-logo-small-hat.png">

  </div>

  <div>

    <div class="demo">


      <button (click)="onEditCourse()">Edit Course</button>

    </div>

    <div class="courses">

      @for (course of courses; track course.id) {
        <app-course-card
          [course]="course"
          [cardIndex]="$index"
          (courseChanged)="save($event)"
          type="beginner">
        </app-course-card>
      }

      @empty {
        <h1>No courses found!</h1>
      }

  </div>


</div>

<router-outlet />
